<!-- BOX MODEL (MOST IMP CONCEPT IN CSS)
A LOT OF LAYOUT PROBLEMS WILL MAKE SENSE


Every single HTML element 
<p> </p>
<div> </div>
<button> </button>
everything is a rectangular box.

so this box has 4 layers:

┌─────────────────────────────┐
│         MARGIN              │  ← space outside (pushes other elements away)
│  ┌───────────────────────┐  │
│  │       BORDER          │  │  ← the visible edge/line
│  │  ┌─────────────────┐  │  │
│  │  │    PADDING      │  │  │  ← space inside (between content and border)
│  │  │  ┌───────────┐  │  │  │
│  │  │  │  CONTENT  │  │  │  │  ← your actual text or image
│  │  │  └───────────┘  │  │  │
│  │  └─────────────────┘  │  │
│  └───────────────────────┘  │
└─────────────────────────────┘
 -->

 <style>
  *{
    box-sizing: border-box
  }

  .card{
    width: 300px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 12px;
    padding : 24px;
    margin: 20px auto; 
    /* AUTO enters it horizontally  */
  }

  .card h2{
    margin: 0 0 8px 0;
    font-size: 20px;
  }

  .card p{
    margin: 0;
    color: #666;
  }
 </style>
<div class="card">
  <h2> This is my first card</h2>
  <p> This is a clean card component using the box model.</p>

</div>

<!-- ALWAYS PUT 
*{box-sizing: border-box;}
at Top everytime. All developer does this without thinking. -->
